<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>VlogShield</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <main>
    <h1>VlogShield</h1>
    <p>Check image metadata before you post.</p>

    <form id="form">
      <input type="file" id="file" accept="image/*" required>
      <button type="submit" id="btn">Scan</button>
    </form>

    <p id="status" hidden></p>
    <section id="result" hidden>
      <p class="score">Score: <span id="score"></span> — <span id="grade"></span></p>
      <ul id="risks"></ul>
      <details id="safe-wrap" hidden>
        <summary>Other metadata</summary>
        <ul id="safe"></ul>
      </details>
    </section>
  </main>
  <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
